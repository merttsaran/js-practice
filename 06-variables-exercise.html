<!DOCTYPE html>
<html>
  <head>
    <title>
      Variables Exercise
    </title>
  </head>
  <body>
    <script>

      const hour = 9;
      const name = 'Mert';

      if (hour >= 6 && hour <= 12) {
        console.log(`Good Morning ${name}!`);
      } else if (hour >= 13 && hour <= 17) {
        console.log(`Good afternoon ${name}!`);
      } else {
        console.log(`Good night ${name}!`);
      }

      
    </script>
  </body>
</html>
